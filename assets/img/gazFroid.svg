<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Pourquoi le gaz froid diminue</title>
<desc>Bilan simple : au centre le stock de gaz froid, une seule entrée qui faiblit à cause de l'expansion, et trois sorties qui continuent : le gaz devient des étoiles et y reste verrouillé, le gaz est éjecté par les supernovæ, le gaz est chauffé et devient inutilisable.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="470" rx="12" fill="#FDFCF9"/>

<text x="340" y="38" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="500" fill="#2C2C2A">1 entrée qui faiblit, 3 sorties qui continuent</text>

<line x1="340" y1="72" x2="340" y2="142" stroke="#378ADD" stroke-width="3" stroke-dasharray="6 8" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="358" y="84" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Le ravitaillement : du gaz neuf tombe</text>
<text x="358" y="100" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">sur la galaxie depuis l'extérieur</text>
<text x="358" y="118" font-family="sans-serif" font-size="12" fill="#5F5E5A">mais l'Univers s'étend, le gaz autour</text>
<text x="358" y="134" font-family="sans-serif" font-size="12" fill="#5F5E5A">se raréfie : il en tombe de moins en moins</text>

<circle cx="340" cy="232" r="72" fill="#B5D4F4" opacity="0.55"/>
<circle cx="340" cy="232" r="72" fill="none" stroke="#378ADD" stroke-width="1.5"/>
<text x="340" y="226" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Gaz froid</text>
<text x="340" y="246" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">le seul qui peut</text>
<text x="340" y="262" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">former des étoiles</text>

<line x1="268" y1="254" x2="152" y2="322" stroke="#BA7517" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<circle cx="118" cy="348" r="6" fill="#EF9F27"/>
<circle cx="98" cy="362" r="4" fill="#EF9F27"/>
<circle cx="140" cy="366" r="3.4" fill="#EF9F27"/>
<text x="118" y="400" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">Devient des étoiles</text>
<text x="118" y="418" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">verrouillé pour des milliards</text>
<text x="118" y="434" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">d'années, presque sans retour</text>

<line x1="340" y1="306" x2="340" y2="358" stroke="#D85A30" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="340" y="400" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Éjecté</text>
<text x="340" y="418" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">soufflé hors de la galaxie</text>
<text x="340" y="434" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">par les supernovæ</text>

<line x1="412" y1="254" x2="528" y2="322" stroke="#E24B4A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M548 338 q 5 -10 0 -20 q -5 -10 0 -20" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/>
<path d="M562 342 q 5 -10 0 -20 q -5 -10 0 -20" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/>
<path d="M576 338 q 5 -10 0 -20 q -5 -10 0 -20" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/>
<text x="562" y="400" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#791F1F">Chauffé</text>
<text x="562" y="418" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#A32D2D">à des millions de degrés :</text>
<text x="562" y="434" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#A32D2D">trop de pression, inutilisable</text>
</svg>
