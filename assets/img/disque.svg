<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Disque épais et disque mince de la Voie lactée</title>
<desc>Vue par la tranche de la Voie lactée : un disque épais et diffus d'étoiles anciennes aux orbites agitées enveloppe un disque mince, plat et brillant, d'étoiles plus jeunes et plus riches en métaux, en rotation ordonnée.</desc>
<rect x="0" y="0" width="680" height="400" rx="12" fill="#0A0E1E"/>

<circle cx="70" cy="40" r="1" fill="#FFFFFF" opacity="0.6"/>
<circle cx="620" cy="200" r="1" fill="#FFFFFF" opacity="0.6"/>
<circle cx="60" cy="220" r="0.9" fill="#FFFFFF" opacity="0.5"/>
<circle cx="600" cy="350" r="1" fill="#FFFFFF" opacity="0.5"/>

<ellipse cx="340" cy="215" rx="220" ry="58" fill="#C9702E" opacity="0.20"/>
<ellipse cx="340" cy="215" rx="220" ry="58" fill="none" stroke="#E8935A" stroke-width="1" stroke-dasharray="5 6" opacity="0.7"/>

<circle cx="200" cy="180" r="1.8" fill="#F2BE9A" opacity="0.85"/>
<circle cx="270" cy="170" r="1.5" fill="#F2BE9A" opacity="0.75"/>
<circle cx="420" cy="175" r="1.7" fill="#F2BE9A" opacity="0.8"/>
<circle cx="490" cy="188" r="1.5" fill="#F2BE9A" opacity="0.7"/>
<circle cx="230" cy="252" r="1.6" fill="#F2BE9A" opacity="0.75"/>
<circle cx="390" cy="258" r="1.8" fill="#F2BE9A" opacity="0.8"/>
<circle cx="470" cy="248" r="1.5" fill="#F2BE9A" opacity="0.7"/>
<circle cx="170" cy="228" r="1.5" fill="#F2BE9A" opacity="0.7"/>

<ellipse cx="340" cy="215" rx="208" ry="13" fill="#7FB3EE" opacity="0.45"/>
<ellipse cx="340" cy="215" rx="208" ry="13" fill="none" stroke="#B7DBFF" stroke-width="1" opacity="0.9"/>
<circle cx="340" cy="215" r="24" fill="#FFF1D0" opacity="0.9"/>
<circle cx="340" cy="215" r="38" fill="#FFE9B8" opacity="0.25"/>

<circle cx="240" cy="215" r="1.6" fill="#EAF3FF"/>
<circle cx="295" cy="212" r="1.4" fill="#EAF3FF"/>
<circle cx="400" cy="217" r="1.6" fill="#EAF3FF"/>
<circle cx="455" cy="213" r="1.4" fill="#EAF3FF"/>
<circle cx="505" cy="216" r="1.3" fill="#EAF3FF"/>
<circle cx="185" cy="217" r="1.3" fill="#EAF3FF"/>

<line x1="450" y1="172" x2="510" y2="110" stroke="#8A93B8" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.8"/>
<text x="650" y="46" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="500" fill="#F2C9AE">Disque épais</text>
<text x="650" y="66" text-anchor="end" font-family="sans-serif" font-size="12" fill="#C79B84">étoiles anciennes, orbites agitées</text>
<text x="650" y="82" text-anchor="end" font-family="sans-serif" font-size="12" fill="#C79B84">pauvres en fer, riches en O et Mg</text>
<text x="650" y="98" text-anchor="end" font-family="sans-serif" font-size="12" fill="#C79B84">↘</text>

<line x1="475" y1="220" x2="525" y2="300" stroke="#8A93B8" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.8"/>
<text x="650" y="322" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="500" fill="#B7DBFF">Disque mince</text>
<text x="650" y="342" text-anchor="end" font-family="sans-serif" font-size="12" fill="#8FA8C8">étoiles plus jeunes, rotation</text>
<text x="650" y="358" text-anchor="end" font-family="sans-serif" font-size="12" fill="#8FA8C8">ordonnée, riches en métaux</text>

<line x1="330" y1="185" x2="240" y2="100" stroke="#8A93B8" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.8"/>
<text x="30" y="88" font-family="sans-serif" font-size="12" fill="#9AA3C4">bulbe central</text>

<text x="340" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B7BFDA">La Voie lactée vue par la tranche</text>
</svg>
